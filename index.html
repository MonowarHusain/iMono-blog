---
layout: default
title: Home
---

<h1>Technical Archive</h1>

<ul>
    {% for post in site.posts %}
    <li>
        <span style="color: #888;">{{ post.date | date: "%b %d" }}</span>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </li>
    {% else %}
    <li>No posts found in the archive yet.</li>
    {% endfor %}
</ul>
