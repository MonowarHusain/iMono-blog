---
layout: default
---
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');

  .post-article {
    font-family: 'Fira Code', monospace !important;
    max-width: 800px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    color: #1a1a1a;
  }

  .post-header {
    margin-bottom: 3rem;
    border-bottom: 1px solid #eee;
    padding-bottom: 2rem;
  }

  .post-title {
    font-size: 2.2rem;
    font-weight: 600;
    margin: 0 0 1rem 0;
    color: #000;
    line-height: 1.2;
  }

  .post-meta {
    color: #6a737d;
    font-size: 0.95rem;
  }

  .post-content {
    line-height: 1.8;
    font-size: 1.05rem;
  }

  /* Step 3: Professional Image Styling */
  .post-content img {
    max-width: 100%;
    height: auto;
    border: 1px solid #e1e4e8;
    border-radius: 8px;
    margin: 30px 0;
    display: block;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
  }

  /* Caption styling */
  .post-content em {
    display: block;
    text-align: center;
    font-size: 0.85rem;
    color: #6a737d;
    margin-top: -20px;
    margin-bottom: 30px;
    font-style: normal;
  }

  .back-link {
    display: inline-block;
    margin-top: 4rem;
    color: #0366d6;
    text-decoration: none;
    font-weight: 600;
  }

  .back-link:hover {
    text-decoration: underline;
  }
</style>

<article class="post-article">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      Published on {{ page.date | date: "%B %d, %Y" }}
      {% if page.author %} • Written by {{ page.author }}{% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <a href="{{ '/' | relative_url }}" class="back-link">← Back to Archive</a>
</article>
