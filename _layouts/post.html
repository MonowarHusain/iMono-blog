---
layout: default
---
<article class="post" style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem; font-family: sans-serif;">
  <header class="post-header" style="margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;">
    <h1 class="post-title" style="margin: 0 0 0.5rem 0;">{{ page.title | escape }}</h1>
    <p class="post-meta" style="color: #666; font-size: 0.9em; margin: 0;">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
      {% if page.author %} • <span itemprop="author">{{ page.author }}</span>{% endif %}
    </p>
  </header>

  <div class="post-content" style="line-height: 1.6; font-size: 1.1em; color: #333;">
    {{ content }}
  </div>

  <div style="margin-top: 3rem;">
    <a href="{{ '/' | relative_url }}" style="color: #0366d6; text-decoration: none;">&larr; Back to Archive</a>
  </div>
</article>
